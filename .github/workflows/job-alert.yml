name: Daily job alert

on:
  schedule:
    - cron: "0 3 * * *"     # 9:00 AM BDT daily -> daily new
    - cron: "30 4 * * 5"    # 10:30 AM BDT Friday -> weekly sweep
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: daily or weekly"
        required: false
        default: "daily"

permissions:
  contents: write

jobs:
  job-alert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ddgs

      - name: Decide mode
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "30 4 * * 5" ]; then
            echo "value=weekly" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.inputs.mode }}" ]; then
            echo "value=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=daily" >> "$GITHUB_OUTPUT"
          fi

      - name: Run job alert script
        env:
          GREENAPI_INSTANCE: ${{ secrets.GREENAPI_INSTANCE }}
          GREENAPI_TOKEN: ${{ secrets.GREENAPI_TOKEN }}
          WHATSAPP_NUMBER: ${{ secrets.WHATSAPP_NUMBER }}
          MODE: ${{ steps.mode.outputs.value }}
        run: python job_alert.py

      - name: Save memory of seen jobs
        run: |
          git config user.name "job-alert-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "update seen jobs"
          git push
